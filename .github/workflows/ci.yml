name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download RARS
        run: |
          curl -L -o rars1_6.jar https://github.com/TheThirdOne/rars/releases/download/v1.6/rars1_6.jar

      - name: Build and run tests
        run: |
          make
          make test
